apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: e2e-test-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-test-app
  template:
    metadata:
      labels:
        app: e2e-test-app
    spec:
      terminationGracePeriodSeconds: 1
      containers:
      - name: app
        image: registry.k8s.io/pause:3.9
