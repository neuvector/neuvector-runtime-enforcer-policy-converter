name: Update .pre-commit-config.yaml
sources:
  cppLinterTag:
    kind: gittag
    spec:
      key: name
      url: https://github.com/cpp-linter/cpp-linter-hooks
      versionFilter:
        kind: latest
  golangcilintTag:
    kind: gittag
    spec:
      key: name
      url: https://github.com/golangci/golangci-lint/
      versionFilter:
        kind: latest
  protolintTag:
    kind: gittag
    spec:
      key: name
      url: https://github.com/yoheimuta/protolint/
      versionFilter:
        kind: latest
  cppLinterVersion:
    kind: gittag
    spec:
      key: hash
      url: https://github.com/cpp-linter/cpp-linter-hooks
      versionFilter:
        kind: latest
  golangcilintVersion:
    kind: gittag
    spec:
      key: hash
      url: https://github.com/golangci/golangci-lint/
      versionFilter:
        kind: latest
  protolintVersion:
    kind: gittag
    spec:
      key: hash
      url: https://github.com/yoheimuta/protolint/
      versionFilter:
        kind: latest

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.author }}"
      email: "{{ .github.email }}"
      owner: "{{ requiredEnv .github.owner }}"
      repository: "runtime-enforcer"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ requiredEnv .github.user }}"
      branch: "{{ .github.branch }}"
      commitusingapi: true
      commitmessage:
        type: "chore"
        title: "update runtime enforcer pre-commit-config.yaml"
        hidecredit: true
        footers: "Signed-off-by: RuntimeEnforcer bot <runtime-enforcer-bot@users.noreply.github.com>"

actions:
  default:
    title: 'chore: update pre-commit-config.yaml'
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      description: |
        Automatic pre-commit-config.yaml update.
        This PR has been created by the automation used to automatically update the pre-commit-config.yaml.
        REMEMBER IF YOU WANT TO MERGE IN A SINGLE COMMIT CHANGES AND VERSION BUMP, YOU MUST SQUASH THE COMMIT BEFORE MERGING THIS PR!
      draft: false
      labels:
        - "chore"


targets:
  update_golangci_lint_version:
    scmid: default
    name: 'update golangci-lint version to {{ source "golangcilintTag" }}'
    kind: yaml
    sourceid: golangcilintVersion
    spec:
      file: .pre-commit-config.yaml
      comment: '{{ source "golangcilintTag" }}'
      engine: yamlpath
      key: $.repos[0].rev
  update_cpplinter_version:
    scmid: default
    name: 'update cpp linter version to {{ source "cppLinterTag" }}'
    kind: yaml
    sourceid: cppLinterVersion
    spec:
      file: .pre-commit-config.yaml
      key: $.repos[1].rev
      comment: '{{ source "cppLinterTag" }}'
      engine: yamlpath
  update_protolint_version:
    scmid: default
    name: 'update protolint version to {{ source "protolintTag" }}'
    kind: yaml
    sourceid: protolintVersion
    spec:
      file: .pre-commit-config.yaml
      key: $.repos[2].rev
      comment: '{{ source "protolintTag" }}'
      engine: yamlpath
